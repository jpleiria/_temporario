<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGO Mobile - Guia de Comando</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --fire: #d32f2f; --hazmat: #f57c00; --accident: #1976d2; --forest: #388e3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { font-size: 1.1rem; text-align: center; color: var(--dark); margin: 10px 0; }
        h2 { font-size: 1rem; border-bottom: 2px solid #ddd; padding-bottom: 5px; margin-top: 0; }
        
        /* Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-m { height: 100px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        
        /* Forms */
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .check-item { display: flex; align-items: center; gap: 10px; background: #f9f9f9; padding: 8px; border-radius: 5px; margin-bottom: 5px; font-size: 0.9rem; }
        .check-item input { width: 18px; height: 18px; }

        /* Ações */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-action { padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; text-align: center; }
        .bg-pdf { background: #555; }
        .bg-wa { background: #25D366; }
        .bg-mail { background: #EA4335; }
        .hidden { display: none; }
        
        @media print { .no-print { display: none; } .card { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

<div class="container">
    <div id="main-menu" class="no-print">
        <div class="card" style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/pt/2/23/Logo_ANEPC.png" alt="ANEPC" style="width: 60px;">
            <h1>SGO - FERRAMENTAS DE COMANDO</h1>
            <div class="menu-grid">
                <button class="btn-m" style="background:var(--hazmat)" onclick="initApp('mat-perig')">MATÉRIAS<br>PERIGOSAS</button>
                <button class="btn-m" style="background:var(--accident)" onclick="initApp('acidentes')">ACIDENTES<br>RODOVIÁRIOS</button>
                <button class="btn-m" style="background:var(--fire)" onclick="initApp('inc-urbano')">INCÊNDIOS<br>ESTRUTURAIS</button>
                <button class="btn-m" style="background:var(--forest)" onclick="initApp('inc-florestal')">INCÊNDIOS<br>FLORESTAIS</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <button class="no-print" onclick="location.reload()" style="background:none; border:none; color:var(--accident); font-weight:bold; margin-bottom:10px;">← NOVO GUIA</button>
        
        <div id="print-area">
            <form id="sgo-form">
                <div class="card">
                    <h2 id="guia-titulo">GUIA DE COMANDO</h2>
                    <div class="row">
                        <div class="form-group"><label>Nº OCORRÊNCIA</label><input type="text" name="ocorr_n"></div>
                        <div class="form-group"><label>HORA POSIT</label><input type="time" name="hora"></div>
                    </div>
                    <div class="form-group"><label>LOCALIZAÇÃO / COORDENADAS</label><input type="text" name="local"></div>
                </div>

                <div id="form-mat-perig" class="hidden card">
                    <div class="row">
                        <div class="form-group"><label>Nº PERIGO</label><input type="text" name="n_perigo"></div>
                        <div class="form-group"><label>Nº ONU</label><input type="text" name="n_onu"></div>
                    </div>
                    <label>NATUREZA DO INCIDENTE</label>
                    <div class="check-item"><input type="checkbox" name="haz_fogo"> Incêndio</div>
                    <div class="check-item"><input type="checkbox" name="haz_fuga"> Fuga (Gás/Vapor)</div>
                    <div class="check-item"><input type="checkbox" name="haz_derrame"> Derrame (Líquido/Sólido)</div>
                    
                    <label>ZONAMENTO (Metros)</label>
                    <div class="row">
                        <div class="form-group"><label>Exclusão</label><input type="number" placeholder="Z. Quente"></div>
                        <div class="form-group"><label>Isolamento</label><input type="number" placeholder="Z. Morna"></div>
                    </div>
                </div>

                <div id="form-acidentes" class="hidden card">
                    <div class="form-group">
                        <label>TIPO DE ACIDENTE</label>
                        <select name="ac_tipo">
                            <option>Colisão Rodoviária</option>
                            <option>Despiste</option>
                            <option>Atropelamento</option>
                            <option>Acidente Ferroviário</option>
                        </select>
                    </div>
                    <label>VÍTIMAS</label>
                    <div class="row">
                        <div class="form-group"><label>Leves</label><input type="number" name="v_l"></div>
                        <div class="form-group"><label>Graves</label><input type="number" name="v_g"></div>
                        <div class="form-group"><label>Óbitos</label><input type="number" name="v_o"></div>
                    </div>
                    <div class="check-item"><input type="checkbox" name="encarcerados"> Encarcerados (Físico/Mecânico)</div>
                    <div class="check-item"><input type="checkbox" name="risco_inc"> Risco de Incêndio / Derrame</div>
                </div>

                <div id="form-inc-urbano" class="hidden card">
                    <div class="form-group">
                        <label>TIPO DE EDIFÍCIO</label>
                        <input type="text" name="edif_tipo" placeholder="Habitação, Indústria, Garagem...">
                    </div>
                    <div class="row">
                        <div class="form-group"><label>Nº Pisos</label><input type="number" name="pisos"></div>
                        <div class="form-group"><label>Piso do Fogo</label><input type="number" name="piso_fogo"></div>
                    </div>
                    <label>PROPAGAÇÃO / RISCOS</label>
                    <div class="check-item"><input type="checkbox" name="prop_vert"> Vertical</div>
                    <div class="check-item"><input type="checkbox" name="prop_horiz"> Horizontal</div>
                    <div class="check-item"><input type="checkbox" name="mat_perig_inc"> Presença Matérias Perigosas</div>
                </div>

                <div id="form-inc-florestal" class="hidden card">
                    <div class="form-group">
                        <label>TIPO DE COMBUSTÍVEL</label>
                        <select name="florest_tipo">
                            <option>Mato / Agrícola</option>
                            <option>Povoamento (Pinhal/Eucaliptal)</option>
                            <option>Misto / Regeneração</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>DECLIVE</label>
                            <select name="declive"><option>Suave</option><option>Moderado</option><option>Acentuado</option></select>
                        </div>
                        <div class="form-group">
                            <label>VENTO</label>
                            <select name="vento"><option>Fraco</option><option>Moderado</option><option>Forte</option></select>
                        </div>
                    </div>
                    <div class="check-item"><input type="checkbox" name="expo_hab"> Exposição de Habitações</div>
                </div>

                <div class="card">
                    <div class="form-group">
                        <label>ESTRATÉGIA / PRIORIDADES</label>
                        <textarea name="estrategia" rows="3" placeholder="Ex: Proteção de exposições, Ataque direto..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>ASSUMO O COMANDO (NOME/CATEGORIA)</label>
                        <input type="text" name="cos_nome" required>
                    </div>
                </div>
            </form>
        </div>

        <div class="actions no-print">
            <button class="btn-action bg-pdf" onclick="savePDF()">💾 GUARDAR PDF</button>
            <button class="btn-action bg-wa" onclick="shareWhatsApp()">📱 WHATSAPP</button>
            <button class="btn-action bg-mail" onclick="shareEmail()">✉️ EMAIL</button>
        </div>
    </div>
</div>

<script>
    let currentType = '';

    function initApp(type) {
        currentType = type;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        
        // Esconder todos os blocos e mostrar o correto
        ['mat-perig', 'acidentes', 'inc-urbano', 'inc-florestal'].forEach(id => {
            document.getElementById('form-' + id).classList.add('hidden');
        });
        document.getElementById('form-' + type).classList.remove('hidden');
        
        const titulos = {
            'mat-perig': 'GUIA DE COMANDO: MATÉRIAS PERIGOSAS',
            'acidentes': 'GUIA DE COMANDO: ACIDENTES',
            'inc-urbano': 'GUIA DE COMANDO: INCÊNDIOS ESTRUTURAIS',
            'inc-florestal': 'GUIA DE COMANDO: INCÊNDIOS FLORESTAIS'
        };
        document.getElementById('guia-titulo').innerText = titulos[type];
    }

    function generateSummary() {
        const form = document.getElementById('sgo-form');
        const data = new FormData(form);
        let text = `*SGO POSIT - ${document.getElementById('guia-titulo').innerText}*\n\n`;
        
        for (let [key, value] of data.entries()) {
            if (value && value !== 'on') {
                text += `*${key.toUpperCase()}:* ${value}\n`;
            } else if (value === 'on') {
                text += `✅ ${key.toUpperCase()}\n`;
            }
        }
        return text;
    }

    function shareWhatsApp() {
        const text = encodeURIComponent(generateSummary());
        window.location.href = `https://wa.me/?text=${text}`;
    }

    function shareEmail() {
        const subject = encodeURIComponent(`SGO POSIT - ${new Date().toLocaleString()}`);
        const body = encodeURIComponent(generateSummary());
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    function savePDF() {
        const element = document.getElementById('print-area');
        const opt = {
            margin: 10,
            filename: `SGO_Relatorio_${Date.now()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>

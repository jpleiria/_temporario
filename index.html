<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGO Operacional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: system-ui; background:#f4f6f9; margin:0; padding-bottom:120px; }
.page { display:none; padding:15px; }
.active { display:block; }

.card {
    background:white;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

h2 { font-size:1rem; margin-bottom:10px; }
input, select, textarea {
    width:100%; padding:10px; margin-bottom:10px;
    border-radius:10px; border:1px solid #ccc;
}

.row { display:flex; gap:10px; }
.btn {
    padding:15px; border:none; border-radius:12px;
    color:white; font-weight:bold; width:100%;
    margin-bottom:10px;
}
.footer {
    position:fixed; bottom:0; width:100%;
    background:white; padding:10px;
    box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}
.quick-btn {
    background:#eee; padding:8px; border-radius:8px;
    margin:3px; display:inline-block; cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="page active">
<div class="card">
<h2>SGO Operacional</h2>

<button class="btn" style="background:#f57c00" onclick="showGuia('hazmat')">Matérias Perigosas</button>
<button class="btn" style="background:#1976d2" onclick="showGuia('accident')">Acidentes</button>
<button class="btn" style="background:#d32f2f" onclick="showGuia('urbano')">Incêndios Urbanos</button>
<button class="btn" style="background:#388e3c" onclick="showGuia('forest')">Incêndios Florestais</button>

</div>
</div>

<!-- FORM -->
<div id="form-page" class="page">
<button onclick="goMenu()">← MENU</button>

<div id="print-area">
<form id="mainForm">

<!-- LOCAL -->
<div class="card">
<h2>LOCALIZAÇÃO</h2>

<div class="row">
<input name="n_ocorr" placeholder="Nº Ocorrência">
<input type="time" name="hora">
</div>

<input name="local" placeholder="Local">

<div class="row">
<input name="coord_n" id="coord_n" placeholder="N">
<input name="coord_w" id="coord_w" placeholder="W">
</div>

<button type="button" onclick="getGPS()">📍 Obter GPS</button>
</div>

<!-- ESTOU -->
<div class="card">
<h2>ESTOU</h2>
<textarea name="estou"></textarea>
</div>

<!-- VEJO -->
<div class="card">
<h2>VEJO</h2>
<textarea name="vejo"></textarea>
</div>

<!-- FAÇO -->
<div class="card">
<h2>FAÇO</h2>

<div>
<span class="quick-btn" onclick="addText('faco','Reconhecimento')">Reconhecimento</span>
<span class="quick-btn" onclick="addText('faco','Proteção exposições')">Proteção</span>
<span class="quick-btn" onclick="addText('faco','Estabilização')">Estabilização</span>
</div>

<textarea name="faco"></textarea>
</div>

<!-- SOLICITO -->
<div class="card">
<h2>SOLICITO</h2>

<div>
<span class="quick-btn" onclick="addText('solicito','Reforço meios')">Reforço</span>
<span class="quick-btn" onclick="addText('solicito','VMER')">VMER</span>
<span class="quick-btn" onclick="addText('solicito','GNR')">GNR</span>
</div>

<textarea name="solicito"></textarea>
</div>

<!-- SITAC -->
<div class="card">
<h2>SITAC</h2>
<textarea name="sitac"></textarea>
</div>

<!-- COS -->
<div class="card">
<h2>COS</h2>
<input name="cos_nome" placeholder="Nome">
</div>

</form>
</div>

<div class="footer">
<button class="btn" style="background:#333" onclick="gerarPDF()">💾 Guardar PDF</button>
</div>

</div>

<script>

// NAVEGAÇÃO
function showGuia(){
    document.getElementById('menu').classList.remove('active');
    document.getElementById('form-page').classList.add('active');
}
function goMenu(){
    document.getElementById('menu').classList.add('active');
    document.getElementById('form-page').classList.remove('active');
}

// GPS
function getGPS(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById('coord_n').value = pos.coords.latitude.toFixed(6);
        document.getElementById('coord_w').value = pos.coords.longitude.toFixed(6);
    });
}

// QUICK BUTTON
function addText(field, text){
    const el = document.querySelector(`[name=${field}]`);
    el.value += (el.value ? ", " : "") + text;
}

// PDF
function gerarPDF(){
    const element = document.getElementById('print-area');

    const opt = {
        margin: 0.5,
        filename: 'SGO_' + Date.now() + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

</script>

</body>
</html>

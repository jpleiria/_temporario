<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGO PRO FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    background:#dfe6e9;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    background:white;
    padding:15px;
}

/* CABEÇALHO */
.header {
    text-align:center;
    border-bottom:2px solid black;
    margin-bottom:10px;
}

.header h1 {
    font-size:18px;
    margin:5px;
}

/* SECÇÕES */
.section {
    border:1px solid #000;
    margin-bottom:10px;
}

.section-title {
    background:#000;
    color:white;
    font-size:13px;
    padding:4px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:5px;
    padding:5px;
}

.grid-2 { grid-template-columns: repeat(2,1fr); }

input, textarea, select {
    width:100%;
    border:1px solid #000;
    padding:5px;
    font-size:12px;
}

textarea {
    min-height:60px;
}

/* BOTÃO */
.btn {
    width:100%;
    padding:15px;
    background:black;
    color:white;
    border:none;
    font-size:16px;
}

/* PRINT */
@media print {
    body { background:white; }
}

</style>
</head>

<body>

<div class="container" id="print">

<div class="header">
<h1>RELATÓRIO SGO - FASE I</h1>
</div>

<!-- IDENTIFICAÇÃO -->
<div class="section">
<div class="section-title">IDENTIFICAÇÃO</div>

<div class="grid">
<input name="n_ocorr" placeholder="Nº Ocorrência">
<input type="date" id="data">
<input type="time" id="hora">
<input placeholder="Canal">
</div>

<div class="grid grid-2">
<input placeholder="Local">
<input placeholder="Freguesia / Concelho">
</div>

<div class="grid grid-2">
<input id="coord_n" placeholder="Latitude">
<input id="coord_w" placeholder="Longitude">
</div>

<button onclick="getGPS()">📍 GPS</button>

</div>

<!-- SITUAÇÃO -->
<div class="section">
<div class="section-title">SITUAÇÃO</div>

<div class="grid grid-2">
<textarea placeholder="ESTOU"></textarea>
<textarea placeholder="VEJO"></textarea>
</div>

<div class="grid grid-2">
<textarea placeholder="FAÇO"></textarea>
<textarea placeholder="SOLICITO"></textarea>
</div>

</div>

<!-- METEO -->
<div class="section">
<div class="section-title">METEOROLOGIA</div>

<div class="grid">
<input placeholder="Temp ºC">
<input placeholder="Vento km/h">
<input placeholder="Direção">
<select>
<option>Sem precipitação</option>
<option>Chuva</option>
</select>
</div>

</div>

<!-- VÍTIMAS -->
<div class="section">
<div class="section-title">VÍTIMAS</div>

<div class="grid">
<input placeholder="Leves">
<input placeholder="Graves">
<input placeholder="Mortos">
<input placeholder="Desaparecidos">
</div>

</div>

<!-- SITAC -->
<div class="section">
<div class="section-title">SITAC</div>
<textarea></textarea>
</div>

<!-- COS -->
<div class="section">
<div class="section-title">COMANDO</div>

<div class="grid">
<input placeholder="Nome COS">
<input placeholder="Categoria">
<input placeholder="Entidade">
<input placeholder="Contacto">
</div>

</div>

<!-- OBS -->
<div class="section">
<div class="section-title">OBSERVAÇÕES</div>
<textarea></textarea>
</div>

<button class="btn" onclick="gerarPDF()">💾 GERAR PDF OFICIAL</button>

</div>

<script>

// AUTO DATA
window.onload = () => {
    const now = new Date();
    document.getElementById('data').value = now.toISOString().split('T')[0];
    document.getElementById('hora').value = now.toTimeString().slice(0,5);
};

// GPS
function getGPS(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById('coord_n').value = pos.coords.latitude.toFixed(6);
        document.getElementById('coord_w').value = pos.coords.longitude.toFixed(6);
    });
}

// PDF
function gerarPDF(){
    const el = document.getElementById('print');

    const ocorr = document.querySelector('[name=n_ocorr]').value || "SGO";
    const file = `SGO_${ocorr}_${new Date().getTime()}.pdf`;

    html2pdf().set({
        margin:0.4,
        filename:file,
        html2canvas:{scale:2},
        jsPDF:{unit:'in', format:'a4'}
    }).from(el).save();
}

</script>

</body>
</html>

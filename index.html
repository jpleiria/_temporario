<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGO - Fase I (ANEPC)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background:#e9ecef;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
}

h1 {
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
}

.section {
    border:1px solid #ccc;
    margin-bottom:15px;
}

.section h2 {
    background:#333;
    color:white;
    font-size:14px;
    padding:5px;
    margin:0;
}

.content {
    padding:10px;
}

.row {
    display:flex;
    gap:10px;
}

input, select, textarea {
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    font-size:13px;
}

textarea { min-height:70px; }

.btn {
    padding:15px;
    background:#000;
    color:white;
    border:none;
    width:100%;
    font-size:16px;
}

/* impressão */
@media print {
    body { background:white; }
}
</style>
</head>

<body>

<div class="container" id="print">

<h1>RELATÓRIO SGO - FASE I</h1>

<!-- IDENTIFICAÇÃO -->
<div class="section">
<h2>IDENTIFICAÇÃO</h2>
<div class="content">

<div class="row">
<input name="n_ocorr" placeholder="Nº Ocorrência">
<input type="date" id="data">
<input type="time" id="hora">
</div>

<input name="local" placeholder="Local">

<div class="row">
<input name="freguesia" placeholder="Freguesia">
<input name="concelho" placeholder="Concelho">
</div>

<div class="row">
<input id="coord_n" placeholder="Latitude">
<input id="coord_w" placeholder="Longitude">
</div>

<button onclick="getGPS()">📍 GPS</button>

</div>
</div>

<!-- SITUAÇÃO -->
<div class="section">
<h2>SITUAÇÃO</h2>
<div class="content">

<label>ESTOU</label>
<textarea name="estou"></textarea>

<label>VEJO</label>
<textarea name="vejo"></textarea>

<label>FAÇO</label>
<textarea name="faco"></textarea>

<label>SOLICITO</label>
<textarea name="solicito"></textarea>

</div>
</div>

<!-- METEOROLOGIA -->
<div class="section">
<h2>METEOROLOGIA</h2>
<div class="content">

<div class="row">
<input type="number" placeholder="Temperatura">
<input type="number" placeholder="Vento km/h">
</div>

<div class="row">
<input placeholder="Direção vento">
<select>
<option>Sem precipitação</option>
<option>Chuva</option>
</select>
</div>

</div>
</div>

<!-- VÍTIMAS -->
<div class="section">
<h2>VÍTIMAS</h2>
<div class="content">

<div class="row">
<input placeholder="Leves">
<input placeholder="Graves">
<input placeholder="Mortos">
</div>

</div>
</div>

<!-- SITAC -->
<div class="section">
<h2>SITAC</h2>
<div class="content">
<textarea name="sitac"></textarea>
</div>
</div>

<!-- COS -->
<div class="section">
<h2>COMANDO</h2>
<div class="content">

<input placeholder="Nome COS">
<input placeholder="Categoria">
<input placeholder="Contacto">

</div>
</div>

<button class="btn" onclick="gerarPDF()">💾 GERAR PDF OFICIAL</button>

</div>

<script>

// DATA AUTOMÁTICA
window.onload = () => {
    const now = new Date();
    document.getElementById('data').value = now.toISOString().split('T')[0];
    document.getElementById('hora').value = now.toTimeString().slice(0,5);
};

// GPS
function getGPS(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById('coord_n').value = pos.coords.latitude.toFixed(6);
        document.getElementById('coord_w').value = pos.coords.longitude.toFixed(6);
    });
}

// PDF
function gerarPDF(){
    const element = document.getElementById('print');

    const n = document.querySelector('[name=n_ocorr]').value || "SGO";
    const file = "SGO_" + n + "_" + Date.now() + ".pdf";

    html2pdf().set({
        margin:0.5,
        filename:file,
        html2canvas:{scale:2},
        jsPDF:{unit:'in', format:'a4'}
    }).from(element).save();
}

</script>

</body>
</html>
